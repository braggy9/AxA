name: AxA
options:
  bundleIdPrefix: com.tombragg
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

targets:
  AxA:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: AxA
        excludes:
          - "**/.DS_Store"
    resources:
      - path: AxA/Support/Assets.xcassets
      - path: AxA/Support/LaunchScreen.storyboard
    settings:
      base:
        SWIFT_VERSION: 5.0
        PRODUCT_BUNDLE_IDENTIFIER: com.tombragg.AxA
        INFOPLIST_FILE: AxA/Support/Info.plist
        PRODUCT_NAME: AxA
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: 89NX9R78Y7
        UIRequiresFullScreen: YES
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: -O
    dependencies:
      - framework: SpriteKit.framework
        embed: false
      - framework: GameplayKit.framework
        embed: false
